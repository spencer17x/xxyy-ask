<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Transaction sandwich analysis fixture</title>
  <desc id="desc">A fixture screenshot showing front run, user transaction, and back run events around a transaction hash.</desc>
  <rect width="960" height="540" rx="24" fill="#f8fafc"/>
  <rect x="32" y="32" width="896" height="476" rx="18" fill="#ffffff" stroke="#dbe3ec"/>
  <text x="64" y="82" fill="#17202e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Sandwich Detection Fixture</text>
  <text x="64" y="112" fill="#647083" font-family="Inter, Arial, sans-serif" font-size="15">Demo data only. Not a real on-chain conclusion.</text>

  <rect x="64" y="150" width="832" height="72" rx="12" fill="#f1f5f9" stroke="#dbe3ec"/>
  <text x="88" y="180" fill="#647083" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">TX HASH</text>
  <text x="88" y="207" fill="#17202e" font-family="Menlo, Consolas, monospace" font-size="18">0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef</text>

  <line x1="152" y1="314" x2="808" y2="314" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="192" cy="314" r="28" fill="#fbf1db" stroke="#c48a27" stroke-width="3"/>
  <circle cx="480" cy="314" r="34" fill="#e4f3ee" stroke="#176b5b" stroke-width="4"/>
  <circle cx="768" cy="314" r="28" fill="#fbf1db" stroke="#c48a27" stroke-width="3"/>

  <text x="142" y="274" fill="#7a4f12" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Front run</text>
  <text x="430" y="266" fill="#105247" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">User tx</text>
  <text x="724" y="274" fill="#7a4f12" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Back run</text>

  <text x="147" y="321" fill="#7a4f12" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">1</text>
  <text x="470" y="322" fill="#105247" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">2</text>
  <text x="723" y="321" fill="#7a4f12" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">3</text>

  <rect x="88" y="382" width="240" height="76" rx="12" fill="#fff8ed" stroke="#efd7a6"/>
  <text x="112" y="412" fill="#7a4f12" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Evidence A</text>
  <text x="112" y="438" fill="#17202e" font-family="Inter, Arial, sans-serif" font-size="15">Adjacent same-pool swap</text>

  <rect x="360" y="382" width="240" height="76" rx="12" fill="#effaf6" stroke="#c7e3da"/>
  <text x="384" y="412" fill="#105247" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Verdict</text>
  <text x="384" y="438" fill="#17202e" font-family="Inter, Arial, sans-serif" font-size="15">Fixture: suspected sandwich</text>

  <rect x="632" y="382" width="240" height="76" rx="12" fill="#eef4fb" stroke="#c8d8ee"/>
  <text x="656" y="412" fill="#29405f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Confidence</text>
  <text x="656" y="438" fill="#17202e" font-family="Inter, Arial, sans-serif" font-size="15">62% demo score</text>
</svg>
